<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter1.html - 阅读与批注</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #121212; --container-bg: #1e1e1e; --text-color: #e0e0e0;
            --red-box-bg: rgba(255, 68, 68, 0.1); --red-box-border: rgba(255, 68, 68, 0.5);
            --blue-box-bg: rgba(51, 181, 229, 0.1); --blue-box-border: rgba(51, 181, 229, 0.5);
        }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 800px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #007acc; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .add-btn { background: #28a745; width: 100%; max-width: 800px; padding: 15px; margin-top: 20px; font-size: 16px; }
        #groups-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; }
        .group { display: flex; flex-direction: column; position: relative; }
        textarea { width: 100%; box-sizing: border-box; background: transparent; color: var(--text-color); border: none; padding: 20px 20px 30px 20px; font-size: 18px; line-height: 1.6; resize: vertical; min-height: 120px; font-family: 'Times New Roman', serif; }
        textarea:focus { outline: none; }
        .red-area { background-color: var(--red-box-bg); border-top-left-radius: 12px; border-top-right-radius: 12px; border-bottom: 2px solid var(--red-box-border); position: relative; }
        .blue-area { background-color: var(--blue-box-bg); border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; border-top: 2px solid var(--blue-box-border); }
        .annotation-btn { position: absolute; bottom: 12px; right: 50%; transform: translateX(50%); width: 12px; height: 12px; background-color: #ff4444; border-radius: 50%; cursor: pointer; border: 2px solid var(--bg-color); }
        .emoji-separator { text-align: center; font-size: 20px; margin: 0; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--container-bg); width: 90%; max-width: 600px; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .modal-content textarea { background: #121212; border: 1px solid #333; min-height: 150px; font-family: system-ui; padding: 10px; }
        .preview-area { background: #2a2a2a; padding: 15px; border-radius: 8px; min-height: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <h3 style="margin:0;">chapter1.html</h3>
        <button id="sync-btn" onclick="syncData()">保存同步数据</button>
    </div>
    <div id="groups-container"></div>
    <button class="add-btn" onclick="addGroup()">+ 添加新对照组</button>

    <div id="modal">
        <div class="modal-content">
            <h3>编辑批注</h3>
            <textarea id="modal-input"></textarea>
            <div class="preview-area" id="modal-preview"></div>
            <div style="text-align: right; margin-top: 10px;">
                <button style="background: #555;" onclick="closeModal()">取消</button>
                <button onclick="saveModal()">保存批注</button>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'moodHappy';
        const REPO = 'dual-read-notes';
        const DATA_PATH = 'chapter1.json';
        let currentGroupIndex = null;
        let fileSha = null;

        window.onload = async () => {
            document.getElementById('modal-input').addEventListener('input', function() {
                document.getElementById('modal-preview').innerHTML = marked.parse(this.value);
            });
            await loadData();
        };

        function addGroup(eng = "", chn = "", anno = "") {
            const container = document.getElementById('groups-container');
            const index = container.children.length / 2; // 因为有分隔符，除以2
            
            // 插入组
            const groupDiv = document.createElement('div');
            groupDiv.className = 'group';
            groupDiv.id = 'group-' + index;
            groupDiv.dataset.annotation = anno;
            
            const dotStyle = anno.trim() ? "box-shadow: 0 0 8px 2px rgba(255, 68, 68, 0.8);" : "";
            
            groupDiv.innerHTML = `
                <div class="red-area">
                    <textarea placeholder="英文原文区域...">${eng}</textarea>
                    <div class="annotation-btn" style="${dotStyle}" onclick="openModal(${index})"></div>
                </div>
                <div class="blue-area">
                    <textarea placeholder="中文翻译区域...">${chn}</textarea>
                </div>
            `;
            container.appendChild(groupDiv);

            // 插入 Emoji 分隔符 (上下各留一个空行)
            const separatorDiv = document.createElement('div');
            separatorDiv.className = 'emoji-separator';
            separatorDiv.innerHTML = '<br>🌿<br><br>'; 
            container.appendChild(separatorDiv);
        }

        function openModal(index) {
            currentGroupIndex = index;
            const anno = document.getElementById('group-' + index).dataset.annotation || "";
            document.getElementById('modal-input').value = anno;
            document.getElementById('modal-preview').innerHTML = marked.parse(anno);
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveModal() {
            const val = document.getElementById('modal-input').value;
            const group = document.getElementById('group-' + currentGroupIndex);
            group.dataset.annotation = val;
            const dot = group.querySelector('.annotation-btn');
            dot.style.boxShadow = val.trim() ? "0 0 8px 2px rgba(255, 68, 68, 0.8)" : "none";
            closeModal();
        }

        async function loadData() {
            const token = localStorage.getItem('gh_token');
            if(!token) { addGroup(); return; }
            
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${DATA_PATH}`, {
                    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const fileData = await res.json();
                    fileSha = fileData.sha;
                    const content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
                    content.forEach(item => addGroup(item.eng, item.chn, item.anno));
                } else {
                    addGroup(); // 文件不存在，加载一个空白组
                }
            } catch (e) { addGroup(); }
        }

        async function syncData() {
            const token = localStorage.getItem('gh_token');
            if(!token) return alert("请先在控制中心配置 Token！");
            
            const btn = document.getElementById('sync-btn');
            btn.innerText = "同步中...";
            
            const data = [];
            document.querySelectorAll('.group').forEach(g => {
                const textareas = g.querySelectorAll('textarea');
                data.push({
                    eng: textareas[0].value, chn: textareas[1].value, anno: g.dataset.annotation
                });
            });

            const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            const body = { message: "Update reading data", content: base64Content };
            if (fileSha) body.sha = fileSha;

            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${DATA_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if(res.ok) {
                    const resData = await res.json();
                    fileSha = resData.content.sha;
                    btn.innerText = "同步成功！";
                    setTimeout(() => btn.innerText = "保存同步数据", 2000);
                } else { throw new Error("同步失败"); }
            } catch (e) {
                alert(e.message);
                btn.innerText = "保存同步数据";
            }
        }
    </script>
</body>
</html>
